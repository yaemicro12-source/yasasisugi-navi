<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>もくてきち - Yasasisugi Navi</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="subpage">
    <nav class="page-nav" aria-label="ページ移動">
      <a href="index.html">メインへ</a>
      <a href="schedule.html">スケジュール</a>
    </nav>

    <section id="goal-section" class="section-panel" aria-labelledby="goal-title">
      <div class="section-heading">
        <p class="eyebrow">もくてきち</p>
        <h1 id="goal-title">どこからどこへ行く？</h1>
        <p>出発地と到着地を入れて、つきたい時間を決めます。</p>
      </div>

      <div class="route-form">
        <section class="start-choice" aria-labelledby="start-choice-title">
          <h2 id="start-choice-title">出発場所を選択</h2>
          <div class="choice-buttons">
            <label class="choice-button">
              <input id="start-home" type="radio" name="start-type" value="home" checked>
              <span>家から</span>
            </label>
            <label class="choice-button">
              <input id="start-work" type="radio" name="start-type" value="work">
              <span>職場から</span>
            </label>
            <label class="choice-button">
              <input id="start-current" type="radio" name="start-type" value="current">
              <span>現在地から</span>
            </label>
          </div>
          <p id="current-location-note" class="current-location-note" hidden>
            現在地機能は今後追加予定です。現在は仮の最寄り駅で計算しています。
          </p>
        </section>

        <div class="route-points" aria-label="到着地">
          <label class="route-field route-field--goal">
            <span>もくてきち</span>
            <input id="goal-place" type="text" placeholder="例：渋谷">
          </label>
        </div>

        <section class="arrival-card" aria-labelledby="arrival-title">
          <h2 id="arrival-title">到着希望日時</h2>
          <div class="date-buttons" aria-label="到着日">
            <button id="today-button" class="date-button is-selected" type="button">今日</button>
            <button id="tomorrow-button" class="date-button" type="button">明日</button>
          </div>

          <div class="arrival-time">
            <label class="field">
              <span>時</span>
              <select id="arrival-hour" aria-label="到着希望時刻の時">
                <option value="00">00</option>
                <option value="01">01</option>
                <option value="02">02</option>
                <option value="03">03</option>
                <option value="04">04</option>
                <option value="05">05</option>
                <option value="06">06</option>
                <option value="07">07</option>
                <option value="08">08</option>
                <option value="09">09</option>
                <option value="10" selected>10</option>
                <option value="11">11</option>
                <option value="12">12</option>
                <option value="13">13</option>
                <option value="14">14</option>
                <option value="15">15</option>
                <option value="16">16</option>
                <option value="17">17</option>
                <option value="18">18</option>
                <option value="19">19</option>
                <option value="20">20</option>
                <option value="21">21</option>
                <option value="22">22</option>
                <option value="23">23</option>
              </select>
            </label>

            <label class="field">
              <span>分</span>
              <select id="arrival-minute" aria-label="到着希望時刻の分">
                <option value="00" selected>00</option>
                <option value="05">05</option>
                <option value="10">10</option>
                <option value="15">15</option>
                <option value="20">20</option>
                <option value="25">25</option>
                <option value="30">30</option>
                <option value="35">35</option>
                <option value="40">40</option>
                <option value="45">45</option>
                <option value="50">50</option>
                <option value="55">55</option>
              </select>
            </label>
          </div>
        </section>
      </div>

      <label class="route-field train-time-field">
        <span>電車に乗る時間</span>
        <input id="train-time" type="time">
      </label>

      <div class="page-actions">
        <button id="route-search-button" class="secondary-action" type="button">
          乗換案内で調べる
        </button>
      </div>

      <div class="page-actions">
        <button id="calculate-button" class="action-button" type="button">よていをたてる</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
