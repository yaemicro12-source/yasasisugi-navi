<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>何時に出るか確認する - Yasashisug Navi</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="subpage">
    <nav class="page-nav" aria-label="ページ移動">
      <a href="index.html">メインへ</a>
      <a href="goal.html">ゴールの設定へ</a>
    </nav>

    <section id="check-section" class="section-panel planner" aria-labelledby="planner-title">
      <div class="section-heading">
        <p class="eyebrow">逆算</p>
        <h1 id="planner-title">何時に出るか確認する</h1>
        <p>移動と準備にかかる時間を入れると、下の予定が更新されます。</p>
      </div>

      <form id="navi-form" class="form">
        <label class="field field--wide">
          <span>目的地</span>
          <input id="destination" type="text" value="はじめて行く場所" placeholder="例: クリニック、駅、待ち合わせ場所">
        </label>

        <label class="field">
          <span>予定開始時刻</span>
          <input id="start-time" type="time" value="10:00" required>
        </label>

        <label class="field">
          <span>何分前に着きたい？</span>
          <input id="arrival-buffer" type="number" min="0" step="1" value="10">
        </label>

        <label class="field">
          <span>移動距離（km）</span>
          <input id="distance" type="number" min="0" step="0.1" value="1.5">
        </label>

        <label class="field">
          <span>歩く速さ（km/h）</span>
          <input id="walking-speed" type="number" min="0.1" step="0.1" value="4.0">
        </label>

        <label class="field">
          <span>準備時間（分）</span>
          <input id="prep-time" type="number" min="0" step="1" value="45">
        </label>

        <label class="field">
          <span>朝ごはん時間（分）</span>
          <input id="breakfast-time" type="number" min="0" step="1" value="20">
        </label>

        <label class="field field--wide">
          <span>迷った時の予備時間（分）</span>
          <input id="extra-time" type="number" min="0" step="1" value="15">
        </label>
      </form>
    </section>

    <section id="schedule-section" class="section-panel schedule" aria-live="polite" aria-labelledby="schedule-title">
      <div class="section-heading">
        <p class="eyebrow">よてい</p>
        <h2 id="schedule-title">今日のタイムライン</h2>
        <p id="summary">入力すると、ここに今日の流れが表示されます。</p>
      </div>

      <div id="timeline" class="timeline"></div>

      <div class="achievement" aria-labelledby="achievement-title">
        <div class="achievement__header">
          <h3 id="achievement-title">今日の達成度</h3>
          <strong id="achievement-percent">0%</strong>
        </div>
        <div id="achievement-blocks" class="achievement__blocks" aria-hidden="true"></div>
        <p id="achievement-count" class="achievement__count">0 / 5 完了</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
