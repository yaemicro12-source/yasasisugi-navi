<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yasasisugi Navi</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <section class="home" aria-labelledby="home-title">
      <div class="home__content">
        <h1 id="home-title" class="home-title">やさしく出発を整えるナビ</h1>
        <p class="app-label">Yasasisugi Navi</p>

        <div class="clock-panel" aria-label="現在時刻と次の目安">
          <time id="current-time" class="current-time">--:--</time>
          <p id="next-reminder" class="next-reminder">最初の予定の5分前 --:--</p>
        </div>

        <div class="navigator">
          <div class="speech" role="status" aria-live="polite">
            <p id="navigator-message">今日はどこに行く？一緒に確認しよう。</p>
          </div>
          <div class="character-slot" aria-label="ナビゲーターキャラクター仮表示">
            <div class="character-placeholder">
              <span>ここに<br>キャラ</span>
            </div>
          </div>
        </div>

        <div class="main-actions" aria-label="メインメニュー">
          <a class="action-button" href="goal.html">
            もくてきち
          </a>
          <a class="action-button" href="schedule.html">
            スケジュール
          </a>
          <button type="button" class="action-button action-button--light" id="lost-button">
            迷った
          </button>
        </div>

        <div id="lost-guide" class="lost-guide" hidden>
          <h2>迷ったときのサポート</h2>
          <p>見えるものや写真から現在地を確認する機能は今後追加予定です。今は、近くの目印や駅名をゆっくり確認してみましょう。</p>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
